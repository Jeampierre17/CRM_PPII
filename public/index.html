<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Presentación Académica</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#032D60;--blue:#0176D3;--sky:#1B96FF;--teal:#06A59A;
  --red:#E5444B;--amber:#F5A623;--green:#27AE60;--purple:#6C3ABD;
  --white:#fff;--muted:#5a6374;--border:#E4E7EC;--light:#F7F8FA;
  --f:'Poppins',sans-serif;
}
html,body{margin:0;padding:0;width:100%;height:100%;font-family:var(--f);background:var(--navy);overflow:hidden;font-size:20px;line-height:1.65}

.deck{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;overflow:hidden;z-index:1}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column}
.slide.active{display:flex;animation:slideIn .55s cubic-bezier(.16,1,.3,1) forwards}
.slide.exit{animation:slideOut .35s cubic-bezier(.4,0,1,1) forwards}

@keyframes slideIn{from{opacity:0;transform:translateY(24px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-16px) scale(1.01)}}
@keyframes floatDecor{0%{transform:translateY(0px)}50%{transform:translateY(-8px)}100%{transform:translateY(0px)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes heroFloat{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
@keyframes heroOrbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

@media (min-width: 1200px) {
  :root{font-size:24px}
  .s1 h1{font-size:clamp(110px,9vw,160px)}
  .s1-desc, .pc p, .mod p, .th p, .dim p, .cit, .s9-sub, .s1-foot,.bc h3,.bc p,.tk h3,.tk p{font-size:clamp(19px,1.7vw,26px)}
  .chip{font-size:clamp(14px,1.2vw,19px)}
  .ttag{font-size:clamp(14px,1.3vw,19px)}
  .tipbox, .tbd{font-size:clamp(16px,1.4vw,21px)}
  .st{font-size:clamp(40px,4vw,62px)}
  .sh-num{font-size:clamp(90px,8vw,140px)}
  .pc h3, .mod h3, .tc h3, .ccard h3, .dim h4, .cnm,.bc h3,.tk h3{font-size:clamp(22px,1.9vw,30px)}
  .bc-stat{font-size:clamp(38px,4vw,52px)}
  .s9-title{font-size:clamp(48px,5.5vw,80px)}
  .s9-sub{font-size:clamp(17px,1.5vw,22px)}
  .sh{padding:clamp(30px,4vw,52px) clamp(48px,5.5vw,96px) clamp(24px,2.5vw,36px)}
  .sb{padding:clamp(18px,2.2vw,28px) clamp(48px,5.5vw,96px) 100px}
  .pg,.dg,.mg,.tr,.cl,.cg,.rg,.bg,.bg2{gap:26px}
  .pc,.db2,.mod,.tc,.ccard,.cit,.tk,.rc,.bc,.tk{padding:30px 28px}
  .s1l{padding:clamp(50px,6.5vw,100px) clamp(50px,6.5vw,96px) clamp(26px,3vw,96px)}
  .s1r{height:480px}
}
@media (max-width: 1080px) {
  .s1{flex-direction:column}
  .s1r{width:100%;height:320px}
  .sh{flex-direction:column;align-items:flex-start;gap:10px}
  .sb{padding-bottom:40px}
  .pg,.dg,.mg,.tr,.cl,.cg,.rg,.bg,.bg2{grid-template-columns:1fr}
  .sh-left,.s1l{width:100%}
  .concept-hero,.impact-hero{grid-template-columns:1fr}
  .story-hero{grid-template-columns:1fr;gap:10px}
  .story-arrow{width:100%;height:40px}
  .story-arrow svg{transform:rotate(90deg);width:40px}
  .concept-panels,.story-panels,.impact-panels{grid-template-columns:1fr 1fr}
}

.slide.active .sh{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .05s both}
.slide.active .sb > *{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
.slide.active .sb > *:nth-child(1){animation-delay:.12s}
.slide.active .sb > *:nth-child(2){animation-delay:.2s}
.slide.active .sb > *:nth-child(3){animation-delay:.28s}
.slide.active .sb > *:nth-child(4){animation-delay:.34s}

.slide.active .pg .pc:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .12s both}
.slide.active .pg .pc:nth-child(2){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .22s both}
.slide.active .pg .pc:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .32s both}
.slide.active .mg .mod:nth-child(1){animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .1s both}
.slide.active .mg .mod:nth-child(2){animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .17s both}
.slide.active .mg .mod:nth-child(3){animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .24s both}
.slide.active .mg .mod:nth-child(4){animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .31s both}
.slide.active .mg .mod:nth-child(5){animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .38s both}
.slide.active .mg .mod:nth-child(6){animation:fadeUp .45s cubic-bezier(.16,1,.3,1) .45s both}
.slide.active .tr .tc:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .12s both}
.slide.active .tr .tc:nth-child(2){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .22s both}
.slide.active .tr .tc:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .32s both}
.slide.active .cg .ccard:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .14s both}
.slide.active .cg .ccard:nth-child(2){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .24s both}
.slide.active .cg .ccard:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .34s both}
.slide.active .bg .bc:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .12s both}
.slide.active .bg .bc:nth-child(2){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .22s both}
.slide.active .bg .bc:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .32s both}
.slide.active .bg .bc:nth-child(4){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .42s both}
.slide.active .bg2 .tk:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .12s both}
.slide.active .bg2 .tk:nth-child(2){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .22s both}
.slide.active .bg2 .tk:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .32s both}

.slide.active .dg .db2:nth-child(1){animation:fadeLeft .5s cubic-bezier(.16,1,.3,1) .1s both}
.slide.active .dg .db2:nth-child(2){animation:fadeRight .5s cubic-bezier(.16,1,.3,1) .2s both}

.slide.active .s1l > *:nth-child(1){animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .05s both}
.slide.active .s1l > *:nth-child(2){animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .14s both}
.slide.active .s1l > *:nth-child(3){animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .22s both}
.slide.active .s1l > *:nth-child(4){animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .30s both}
.slide.active .s1l > *:nth-child(5){animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .38s both}
.slide.active .s1r{animation:fadeLeft .7s cubic-bezier(.16,1,.3,1) .08s both}

.slide.active .s9-content > *:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .06s both}
.slide.active .s9-content > *:nth-child(2){animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .14s both}
.slide.active .s9-content > *:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .22s both}
.slide.active .s9-content > *:nth-child(4){animation:scaleIn .5s cubic-bezier(.16,1,.3,1) .28s both}
.slide.active .s9-content > *:nth-child(5){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .32s both}
.slide.active .members-grid .member:nth-child(1){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .36s both}
.slide.active .members-grid .member:nth-child(2){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .43s both}
.slide.active .members-grid .member:nth-child(3){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .50s both}
.slide.active .members-grid .member:nth-child(4){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .57s both}
.slide.active .members-grid .member:nth-child(5){animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .64s both}
.slide.active .s9-course{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .6s both}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}

.nav{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:0;z-index:9999;background:rgba(8,13,26,.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:3px 6px;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.nav-btn{background:none;border:none;cursor:pointer;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);transition:all .25s;font-family:var(--f);font-size:11px}
.nav-btn:hover{background:rgba(27,150,255,.15);color:#1B96FF}
.nav-dots{display:flex;align-items:center;gap:4px;padding:0 8px}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1)}
.dot.on{width:16px;border-radius:4px;background:linear-gradient(90deg,var(--sky),var(--teal));box-shadow:0 0 6px rgba(27,150,255,.3)}
.dot:hover:not(.on){background:rgba(255,255,255,.5);transform:scale(1.3)}
.nav-divider{width:1px;height:12px;background:rgba(255,255,255,.08);margin:0 2px}
.nav-info{display:flex;align-items:center;gap:6px;padding:0 4px 0 2px}
.snum{font-size:9px;color:rgba(255,255,255,.3);font-weight:500;letter-spacing:.04em;white-space:nowrap}

.progress-line{position:fixed;top:0;left:0;height:3px;z-index:9998;background:linear-gradient(90deg,var(--sky),var(--teal),var(--sky));background-size:200% 100%;animation:gradientShift 3s ease infinite;transition:width .4s cubic-bezier(.16,1,.3,1);box-shadow:0 0 12px rgba(27,150,255,.6),0 0 4px rgba(6,165,154,.4)}

.slide-badge{position:fixed;top:16px;right:20px;z-index:9998;display:flex;align-items:center;gap:7px;background:rgba(8,13,26,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:6px 14px;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.slide-badge .sb-num{font-size:11px;font-weight:600;color:#fff;letter-spacing:.02em}
.slide-badge .sb-total{font-size:10px;color:rgba(255,255,255,.3);font-weight:400}
.slide-badge .sb-title{font-size:10px;color:rgba(255,255,255,.45);font-weight:400;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slide-badge .sb-sep{width:1px;height:12px;background:rgba(255,255,255,.1)}

.nav-hint{display:none}

/* SLIDE 1 — COVER */
.s1{background:linear-gradient(135deg,#021E40 0%,var(--navy) 30%,#042A52 60%,#05407A 100%);flex-direction:column;position:relative;overflow:hidden}
.s1::before{content:'';position:absolute;top:-20%;right:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(27,150,255,.08) 0%,transparent 70%);pointer-events:none}
.s1::after{content:'';position:absolute;bottom:-10%;left:-5%;width:40%;height:40%;background:radial-gradient(circle,rgba(6,165,154,.06) 0%,transparent 70%);pointer-events:none}
.s1l{flex:1;padding:clamp(48px,6vw,80px) clamp(56px,7vw,100px);display:flex;flex-direction:column;justify-content:center;gap:clamp(20px,2.5vw,32px);position:relative;z-index:1}
.s1r{width:38%;position:relative;overflow:hidden;flex-shrink:0;z-index:1}
.s1r::before,
.s1r::after{content:'';position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(27,150,255,.12) 0%,transparent 70%);mix-blend-mode:screen;animation:heroOrbit 26s linear infinite;z-index:0}
.s1r::before{width:260px;height:260px;top:40px;left:10%;animation-duration:32s;opacity:.3}
.s1r::after{width:180px;height:180px;bottom:30px;right:5%;animation-duration:22s;opacity:.25}
.s1r svg.bg{position:absolute;top:15%;left:0;right:0;bottom:0;width:100%;height:85%;animation:heroFloat 7s ease-in-out infinite;filter:drop-shadow(0 12px 32px rgba(0,0,0,.25))}
.eyebrow-row{display:flex;align-items:center;gap:8px}
.e-dot{width:6px;height:6px;border-radius:50%;background:var(--sky);box-shadow:0 0 8px rgba(27,150,255,.4)}
.e-lbl{font-size:clamp(11px,1.2vw,15px);font-weight:600;color:#5A9FD4;letter-spacing:.18em;text-transform:uppercase}
.s1 h1{font-size:clamp(82px,10vw,140px);font-weight:800;line-height:.85;letter-spacing:-5px;color:#fff;text-shadow:0 2px 40px rgba(0,0,0,.2)}
.s1 h1 em{font-style:normal;background:linear-gradient(135deg,#1B96FF,#06A59A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s1-desc{font-size:clamp(16px,1.8vw,24px);color:#8AADCC;font-weight:300;line-height:1.75;max-width:620px}
.chips{display:flex;gap:clamp(10px,1.2vw,14px);flex-wrap:wrap;margin-top:8px}
.chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#9FC4DF;font-size:clamp(13px,1.3vw,17px);font-weight:500;padding:8px 22px;border-radius:24px;backdrop-filter:blur(4px);transition:all .2s}
.chip:hover{background:rgba(27,150,255,.1);border-color:rgba(27,150,255,.3)}
.s1-foot{font-size:clamp(12px,1.2vw,15px);color:#3D6B8F;margin-top:auto;font-weight:300;line-height:1.6}

/* COMMON CONTENT SLIDES */
.content-slide{background:linear-gradient(135deg,#F8FAFB 0%,#EDF2F7 50%,#F0F4FA 100%);position:relative}
.content-slide::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(3,45,96,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(3,45,96,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.content-slide::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(27,150,255,.04) 0%,transparent 50%),radial-gradient(circle at 20% 80%,rgba(6,165,154,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.sh{padding:clamp(24px,3.5vw,40px) clamp(48px,6vw,88px) clamp(16px,2vw,24px);display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(3,45,96,.06);position:relative;z-index:1}
.sh-left{display:flex;flex-direction:column;gap:4px}
.ey{font-size:clamp(11px,1.2vw,15px);font-weight:600;color:var(--sky);letter-spacing:.18em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.ey::before{content:'';width:20px;height:2px;background:linear-gradient(90deg,var(--sky),var(--teal));border-radius:2px;display:inline-block}
.st{font-size:clamp(28px,3.5vw,42px);font-weight:800;color:var(--navy);letter-spacing:-.5px;line-height:1.1}
.sh-num{font-size:clamp(60px,7vw,100px);font-weight:800;color:rgba(3,45,96,.04);letter-spacing:-4px;line-height:1;user-select:none}
.sb{flex:1;padding:clamp(14px,2.2vw,22px) clamp(48px,6vw,88px) 72px;overflow:auto;position:relative;z-index:1;display:flex;flex-direction:column;gap:clamp(18px,2.2vw,32px)}
.sb::-webkit-scrollbar{width:6px}
.sb::-webkit-scrollbar-thumb{background:rgba(3,45,96,.18);border-radius:6px}
.content-slide.active{flex-direction:column}
.content-slide .sb{flex:1;height:100%}

/* S2 PAIN CARDS */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,2vw,24px);margin-top:16px}
.pg{grid-auto-rows:1fr}
.pc{background:#fff;border:1px solid rgba(228,231,236,.6);border-radius:16px;padding:clamp(20px,2.5vw,32px) clamp(18px,2vw,24px);position:relative;overflow:hidden;transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:0 2px 12px rgba(0,0,0,.03)}
.pc:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 8px 32px rgba(1,118,211,.1)}
.pc::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),#FF7B7B);border-radius:16px 16px 0 0}
.pc-icon{width:48px;height:48px;border-radius:14px;background:#FEF0F0;display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 12px rgba(229,68,75,.1)}
.pc h3{font-size:clamp(18px,1.8vw,24px);font-weight:700;color:var(--navy);margin-bottom:6px}
.pc p{font-size:clamp(14px,1.4vw,18px);color:var(--muted);line-height:1.65;font-weight:400}
.def-ban{background:linear-gradient(135deg,var(--navy) 0%,#05407A 100%);border-radius:16px;padding:clamp(18px,2.5vw,28px) clamp(22px,3vw,32px);margin-top:16px;box-shadow:0 4px 20px rgba(3,45,96,.2)}
.def-ban .dl{font-size:10px;font-weight:600;color:#5A9FD4;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.def-ban p{font-size:clamp(11px,1.15vw,13.5px);color:#B0CEEA;line-height:1.75;font-weight:300}
.def-ban strong{color:#fff;font-weight:600}

/* S3 DEFINICION */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,2.5vw,28px);margin-top:18px}
.db2{background:#fff;border:1px solid rgba(228,231,236,.6);border-radius:18px;padding:clamp(22px,2.5vw,32px) clamp(20px,2.2vw,28px);transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:0 2px 12px rgba(0,0,0,.03)}
.db2:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 8px 28px rgba(1,118,211,.08)}
.dbl{font-size:10.5px;font-weight:700;color:var(--blue);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.db2 p{font-size:clamp(12px,1.25vw,14.5px);color:var(--muted);line-height:1.7}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.ttag{background:linear-gradient(135deg,#EEF5FF,#E3EFFC);color:#0176D3;font-size:clamp(10px,1.05vw,12px);font-weight:600;padding:5px 14px;border-radius:20px;border:1px solid #C8DFFE;box-shadow:0 1px 4px rgba(1,118,211,.06)}
.dims{display:flex;flex-direction:column;gap:10px}
.dim{display:flex;gap:13px;align-items:flex-start;padding:clamp(12px,1.5vw,18px) clamp(14px,1.5vw,18px);border-radius:14px;border:1px solid var(--border);background:linear-gradient(135deg,#FAFBFE,#F5F7FC);transition:all .2s}
.dim:hover{border-color:rgba(1,118,211,.2);box-shadow:0 4px 16px rgba(0,0,0,.04)}
.dico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dico.i1{background:#EEF5FF}.dico.i2{background:#E8FAF8}.dico.i3{background:#FFF3E8}
.dim h4{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px}
.dim p{font-size:clamp(12px,1.2vw,15px);color:var(--muted);line-height:1.5}

/* Concept slide makeover */
.concept-stage{height:100%;display:flex;flex-direction:column;gap:clamp(14px,1.8vw,24px);padding:clamp(14px,2vw,22px) clamp(48px,6vw,88px) clamp(24px,3vw,36px)}
.concept-hero{flex:1;display:flex;gap:clamp(22px,2.8vw,44px);align-items:stretch;min-height:0;overflow:hidden}
.concept-left{flex:1;background:rgba(255,255,255,.95);border-radius:40px;padding:clamp(22px,2.8vw,38px);border:1px solid rgba(3,45,96,.08);box-shadow:0 30px 80px rgba(3,45,96,.08);display:flex;flex-direction:column;gap:18px;min-height:0;overflow:auto}
.concept-left::-webkit-scrollbar{width:4px}
.concept-left::-webkit-scrollbar-thumb{background:rgba(3,45,96,.12);border-radius:4px}

<body>
<div class="deck" id="deck"><!-- slides loaded dynamically --></div>

<div class="progress-line" id="prog" style="width:7.69%"></div>

<div class="slide-badge" id="badge-bar">
  <span class="sb-num" id="badge-num">01</span>
  <span class="sb-sep"></span>
  <span class="sb-title" id="badge-title">Portada</span>
  <span class="sb-sep"></span>
  <span class="sb-total" id="badge-total">/ 13</span>
</div>

<div class="nav" id="nav">
  <button class="nav-btn" onclick="go(-1)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="nav-dots" id="dots"></div>
  <div class="nav-divider"></div>
  <div class="nav-info"><span class="snum" id="sn">1 / 15</span></div>
  <button class="nav-btn" onclick="go(1)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>
<div class="nav-hint">← → navegar &nbsp;·&nbsp; F para pantalla completa</div>

<script src="crm-app.js"></script>
<script>
const TOTAL_SLIDES = 15;
const SLIDE_VERSION = '20260413-2';
const slideNames = ['Portada','Conceptos','Tipos','¿Por qué CRM?','Impacto','Módulos','Metodología','Demo CRM','Casos reales','Ejemplos reales','Herramientas','Desafíos','Futuro CRM','Conclusión','Agradecimiento'];
let cur = 0, sl;

async function loadSlides() {
  const deck = document.getElementById('deck');
  const fetches = [];
  for (let i = 1; i <= TOTAL_SLIDES; i++) {
    const num = String(i).padStart(2, '0');
    fetches.push(
      fetch(`slides/slide-${num}.html?v=${SLIDE_VERSION}`, {cache:'no-store'})
        .then(r => r.text())
    );
  }
  const htmls = await Promise.all(fetches);
  deck.innerHTML = htmls.join('\n');

  sl = document.querySelectorAll('.slide');
  sl[0].classList.add('active');

  const dd = document.getElementById('dots');
  for (let i = 0; i < sl.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.onclick = () => show(i);
    dd.appendChild(d);
  }

  updateUI();
}

function updateUI() {
  const tot = sl.length;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === cur));
  document.getElementById('sn').textContent = (cur + 1) + ' / ' + tot;
  document.getElementById('prog').style.width = ((cur + 1) / tot * 100) + '%';
  document.getElementById('badge-num').textContent = String(cur + 1).padStart(2, '0');
  document.getElementById('badge-title').textContent = slideNames[cur] || '';
  document.getElementById('badge-total').textContent = '/ ' + tot;
}

function show(n) {
  const tot = sl.length;
  sl[cur].classList.remove('active');
  cur = (n + tot) % tot;
  sl[cur].classList.add('active');
  updateUI();
  if (cur === 7) injectCRM();
}

function go(d) { show(cur + d); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  if (e.key === 'f' || e.key === 'F') {
    const el = document.documentElement;
    if (!document.fullscreenElement) el.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
});

let crmLoaded = false;
function injectCRM() {
  if (crmLoaded) return;
  crmLoaded = true;
  const iframe = document.getElementById('crm-iframe');
  if (!iframe) return;
  const crmHTML = getCRMHTML();
  const blob = new Blob([crmHTML], { type: 'text/html' });
  iframe.src = URL.createObjectURL(blob);
}

loadSlides();
</script>
</body>
